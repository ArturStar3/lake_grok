services:
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: tileserver-gl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/data
    environment:
      TILESERVER_GL_ALLOWED_HOSTS: "localhost,127.0.0.1"
    command:
      - "--config"
      - "config.json"
      - "--public_url"
      - "http://localhost:8080/"